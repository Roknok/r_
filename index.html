<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Level Game</title>
<style>
  body{
    margin:0;
    background:#0b0f1a;
    color:white;
    font-family:system-ui, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
  }
  .box{
    text-align:center;
    width:600px;
  }
  .title{
    font-size:20px;
    margin-bottom:20px;
    opacity:.8;
  }
  .input{
    font-size:28px;
    letter-spacing:6px;
    margin-bottom:20px;
    min-height:40px;
  }
  .keyboard{margin-top:20px}
  .row{display:flex;justify-content:center;gap:6px;margin:4px 0}
  .key{
    width:34px;
    height:34px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#111827;
    border-radius:4px;
    font-size:14px;
  }
  .message{margin-top:15px;color:#ff8c8c}
</style>
</head>
<body>
<div class="box">
  <div id="level" class="title"></div>
  <div id="display" class="input"></div>
  <div id="message" class="message"></div>
  <div id="keyboard" class="keyboard" style="display:none"></div>
</div>

<script>
const rounds = ["apple","banana","puzzle"];

const qwerty = [
  "qwertyuiop".split(""),
  "asdfghjkl".split(""),
  "zxcvbnm".split("")
];

let level = 0;
let target = rounds[level];
let typed = "";
let wrong = 0;
let totalInputs = 0; // counts letters typed (never decreases)
let mapping = identity();

const levelEl = document.getElementById("level");
const displayEl = document.getElementById("display");
const messageEl = document.getElementById("message");
const keyboardEl = document.getElementById("keyboard");

function identity(){
  let m={};
  for(let i=97;i<=122;i++){
    let c=String.fromCharCode(i);
    m[c]=c;
  }
  return m;
}

function shuffleMap(){
  let letters=[];
  for(let i=97;i<=122;i++) letters.push(String.fromCharCode(i));
  for(let i=letters.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [letters[i],letters[j]]=[letters[j],letters[i]];
  }
  let m={};
  let idx=0;
  for(let i=97;i<=122;i++){
    m[String.fromCharCode(i)] = letters[idx++];
  }
  return m;
}

function render(){
  levelEl.textContent = `Level ${level+1} — type ${target}`;
  displayEl.textContent = typed;
}

function showKeyboard(){
  keyboardEl.innerHTML="";
  keyboardEl.style.display="block";
  qwerty.forEach(r=>{
    let row=document.createElement("div");
    row.className="row";
    r.forEach(k=>{
      let key=document.createElement("div");
      key.className="key";
      key.textContent = mapping[k].toUpperCase();
      row.appendChild(key);
    });
    keyboardEl.appendChild(row);
  });
}

function nextLevel(){
  level++;
  if(level>=rounds.length){
    levelEl.textContent="Done. Thank for playing. Unfortunately there is no reward.";
    keyboardEl.style.display="none";
    displayEl.textContent="";
    messageEl.textContent="";
    return;
  }
  target=rounds[level];
  typed="";
  wrong=0;
  totalInputs=0;
  messageEl.textContent="";
  keyboardEl.style.display="none";
  mapping = level===1 ? shuffleMap() : identity();
  render();
}

document.addEventListener("keydown",e=>{

  // BACKSPACE
  if(e.key === "Backspace"){
    e.preventDefault();
    if(typed.length > 0){
      let lastIndex = typed.length - 1;
      if(typed[lastIndex] !== target[lastIndex]) wrong--;
      typed = typed.slice(0,-1);
      render();
    }
    return;
  }

  // LETTERS ONLY
  if(!/[a-zA-Z]/.test(e.key)) return;
  e.preventDefault();

  let physical = e.key.toLowerCase();
  let output = mapping[physical];

  if(level===0) mapping = identity();

  typed += output;
  totalInputs++;

  if(output !== target[typed.length-1]) wrong++;

  render();

  // ===== LEVEL 2 =====
  if(level===1){

    // Reveal keyboard after 3 wrong letters
    if(wrong >= 3 && keyboardEl.style.display === "none"){
      messageEl.textContent = "you thought it was gonna be that simple?";
      showKeyboard();
    }

    // Check using totalInputs (ignores backspace)
    if(totalInputs >= target.length){
      if(typed === target){
        nextLevel();
      } else {
        messageEl.textContent = "wrong";
      }
    }

    return;
  }

  // ===== LEVEL 3 =====
  if(level===2){
    mapping = shuffleMap();
    showKeyboard();
  }

  // Level 1 + Level 3 win condition
  if(typed.length === target.length){
    if(typed === target){
      nextLevel();
    } else {
      messageEl.textContent = "wrong";
    }
  }

});

render();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Curves + Neon Smear</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #111;
  }
  canvas {
    display: block;
    position: absolute;
    top: 0;
    left: 0;
  }
</style>
</head>
<body>

<canvas id="stainCanvas"></canvas>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const stainCanvas = document.getElementById("stainCanvas");
const stainCtx = stainCanvas.getContext("2d");

resize();
window.addEventListener("resize", resize);

function resize() {
  canvas.width = stainCanvas.width = window.innerWidth;
  canvas.height = stainCanvas.height = window.innerHeight;
}

let paths = [];
let stains = [];

// ---------------- INPUT ----------------
canvas.addEventListener("mousedown", handleInput);
canvas.addEventListener("touchstart", (e) => {
  const touch = e.touches[0];
  handleInput({ clientX: touch.clientX, clientY: touch.clientY });
});

function randomGreen() {
  let g = Math.floor(150 + Math.random() * 100);
  let r = Math.floor(Math.random() * 60);
  let b = Math.floor(Math.random() * 60);
  return `rgb(${r}, ${g}, ${b})`;
}

// ✅ NEW: avoid green hue range (70°–150°)
function getNonGreenHue(baseHue) {
  let variation = (Math.random() - 0.5) * 40;
  let hue = (baseHue + variation + 360) % 360;

  if (hue >= 70 && hue <= 150) {
    if (hue < 110) {
      hue = 70;
    } else {
      hue = 150;
    }
  }

  return hue;
}

function handleInput(e) {
  const rect = canvas.getBoundingClientRect();
  const targetX = e.clientX - rect.left;
  const targetY = e.clientY - rect.top;

  const startX = targetX;
  const startY = canvas.height;

  let segments = 40;
  let points = [];

  let amplitude = 20 + Math.random() * 40;
  let frequency = 1 + Math.random() * 2;
  let phase = Math.random() * Math.PI * 2;

  for (let i = 0; i <= segments; i++) {
    let t = i / segments;

    let sway = Math.sin(t * Math.PI * frequency + phase) * amplitude * (1 - t);

    let x = startX + sway;
    let y = startY + (targetY - startY) * t;

    points.push({ x, y });
  }

  let spawnMid = Math.random() < 0.5;
  let midIndex = Math.floor((0.3 + Math.random() * 0.4) * segments);

  let baseHue = Math.random() * 360;

  paths.push({
    points,
    progress: 0,
    done: false,
    targetX,
    targetY,
    startColor: randomGreen(),
    endColor: randomGreen(),
    spawnMid,
    midIndex,
    midDone: false,
    baseHue
  });
}

// ---------------- DRAW MAIN LINE ----------------
function drawPath(path) {
  let pts = path.points;
  let maxIndex = Math.floor(path.progress * (pts.length - 1));

  if (maxIndex < 2) return;

  let gradient = ctx.createLinearGradient(
    pts[0].x, pts[0].y,
    path.targetX, path.targetY
  );

  gradient.addColorStop(0, path.startColor);
  gradient.addColorStop(1, path.endColor);

  for (let i = 1; i < maxIndex; i++) {
    let p1 = pts[i - 1];
    let p2 = pts[i];

    let t = i / pts.length;
    let thickness = 6 * (1 - t) + 1;

    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.lineWidth = thickness;
    ctx.strokeStyle = gradient;
    ctx.stroke();
  }

  if (path.spawnMid && !path.midDone && maxIndex >= path.midIndex) {
    path.midDone = true;

    let p = pts[path.midIndex];
    let color = path.startColor;
    let count = 1 + Math.floor(Math.random() * 2);

    for (let i = 0; i < count; i++) {
      let angle = (Math.PI / 2) + (Math.random() - 0.5) * 0.4;
      let length = 60 + Math.random() * 60;

      stains.push({
        x: p.x,
        y: p.y,
        angle,
        length,
        progress: 0,
        speed: 0.015 + Math.random() * 0.015,
        customColor: color,
        thin: true
      });
    }
  }
}

// ---------------- FINAL STAIN ----------------
function createStain(x, y, baseHue) {
  let streakCount = 3 + Math.floor(Math.random() * 4);

  for (let i = 0; i < streakCount; i++) {
    let baseAngle = (i / (streakCount - 1)) * Math.PI;
    let angle = baseAngle + (Math.random() - 0.5) * 0.5;

    let length = 30 + Math.random() * 60;

    // ✅ UPDATED: use non-green hue
    let hue = getNonGreenHue(baseHue);

    stains.push({
      x, y,
      angle,
      length,
      progress: 0,
      speed: 0.02 + Math.random() * 0.02,
      hue
    });
  }
}

// ---------------- DRAW STAINS ----------------
function drawStains() {
  for (let s of stains) {
    if (s.progress >= 1) continue;

    let prev = s.progress;
    s.progress += s.speed;
    if (s.progress > 1) s.progress = 1;

    let steps = 20;

    for (let i = 0; i < steps; i++) {
      let t1 = prev + (s.progress - prev) * (i / steps);
      let t2 = prev + (s.progress - prev) * ((i + 1) / steps);

      let x1 = s.x + Math.cos(s.angle) * s.length * t1;
      let y1 = s.y - Math.sin(s.angle) * s.length * t1;

      let x2 = s.x + Math.cos(s.angle) * s.length * t2;
      let y2 = s.y - Math.sin(s.angle) * s.length * t2;

      let width = s.thin
        ? 1 + Math.sin(t2 * Math.PI) * 12
        : 2 + Math.sin(t2 * Math.PI) * 40;

      let alpha = Math.sin(t2 * Math.PI) ;

      let color = s.customColor
        ? s.customColor.replace("rgb", "rgba").replace(")", `,${alpha})`)
        : `hsla(${s.hue}, 100%, 60%, ${alpha})`;

      stainCtx.beginPath();
      stainCtx.moveTo(x1, y1);
      stainCtx.lineTo(x2, y2);
      stainCtx.lineWidth = width;
      stainCtx.strokeStyle = color;
      stainCtx.stroke();
    }
  }
}

// ---------------- LOOP ----------------
function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let path of paths) {
    if (path.progress < 1) {
      path.progress += 0.015;
      if (path.progress >= 1 && !path.done) {
        path.done = true;
        createStain(path.targetX, path.targetY, path.baseHue);
      }
    }
    drawPath(path);
  }

  drawStains();

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>

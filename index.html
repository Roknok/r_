<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Doodle Jump Enhanced</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden; /* Prevent bounce scrolling on mobile */
      font-family: Arial, sans-serif;
      touch-action: none; /* Disables browser-level zoom/scroll gestures */
    }
    #game-container {
      position: relative;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    canvas { 
      background: #222; 
      display: block;
    }
    #restart-btn {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 15px 30px;
      font-size: 20px;
      background: lime;
      border: none;
      cursor: pointer;
      display: none;
      border-radius: 10px;
      font-weight: bold;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="game-container">
  <canvas id="game"></canvas>
  <button id="restart-btn">Restart Game</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const restartBtn = document.getElementById("restart-btn");

// INTERNAL LOGICAL DIMENSIONS
// This ensures physics and scoring are identical on all devices
const LOGIC_W = 400;
const LOGIC_H = 600;

function resize() {
  const scale = Math.min((window.innerWidth * 0.9) / LOGIC_W, (window.innerHeight * 0.9) / LOGIC_H);
  canvas.width = LOGIC_W * scale;
  canvas.height = LOGIC_H * scale;
  ctx.setTransform(scale, 0, 0, scale, 0, 0); // Scales all drawing operations automatically
}

window.addEventListener('resize', resize);
resize();

let gravity = 0.4;
let jumpForce = -11;
let gameOver = false;
let score = 0;
let lastSpecialScore = 0;

let player = { x: 180, y: 500, w: 40, h: 40, vx: 0, vy: 0 };
let platforms = [];

function createPlatforms() {
  platforms = [];
  platforms.push({ x: 160, y: 540, w: 80, h: 10, type: "safe" });
  let lastX = 160;
  for (let i = 1; i < 7; i++) {
    let p = generatePlatform(540 - i * 90, lastX);
    platforms.push(p);
    lastX = p.x;
  }
}

function generatePlatform(y, lastX) {
  let typeRand = Math.random();
  let p = {
    x: lastX + (Math.random() * 120 - 60),
    y: y,
    w: 80,
    h: 10,
    type: "normal",
    vx: 0,
    hits: 0
  };
  p.x = Math.max(0, Math.min(LOGIC_W - p.w, p.x));
  if (typeRand < 0.25) {
    p.type = "moving";
    p.vx = Math.random() < 0.5 ? 1.5 : -1.5;
  } else if (typeRand < 0.5) {
    p.type = "break";
  }
  return p;
}

createPlatforms();

let keys = {};
let targetX = null;

// INPUT HANDLING
document.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;
  if (gameOver && e.key.toLowerCase() === "r") reset();
});
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Unified Touch/Mouse Logic
function handleInput(e) {
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  // Convert screen pixels back to logical game units
  const scale = canvas.width / LOGIC_W;
  targetX = (clientX - rect.left) / scale;
}

canvas.addEventListener("touchstart", e => { e.preventDefault(); handleInput(e); }, {passive: false});
canvas.addEventListener("touchmove", e => { e.preventDefault(); handleInput(e); }, {passive: false});
canvas.addEventListener("touchend", () => targetX = null);
canvas.addEventListener("mousedown", handleInput);
canvas.addEventListener("mousemove", e => { if (targetX !== null) handleInput(e); });
canvas.addEventListener("mouseup", () => targetX = null);

restartBtn.addEventListener("click", reset);

function reset() {
  player.x = 180; player.y = 500; player.vy = 0;
  score = 0; lastSpecialScore = 0;
  gameOver = false;
  restartBtn.style.display = "none";
  createPlatforms();
}

function update() {
  if (gameOver) {
    restartBtn.style.display = "block";
    return;
  }

  let prevY = player.y;
  const deadzone = 5;

  if (keys["arrowleft"] || keys["a"]) player.vx = -5;
  else if (keys["arrowright"] || keys["d"]) player.vx = 5;
  else if (targetX !== null) {
    let center = player.x + player.w/2;
    if (targetX < center - deadzone) player.vx = -5;
    else if (targetX > center + deadzone) player.vx = 5;
    else player.vx = 0;
  } else player.vx = 0;

  player.vy += gravity;
  player.x += player.vx;
  player.y += player.vy;

  if (player.x < 0) player.x += LOGIC_W;
  if (player.x > LOGIC_W) player.x -= LOGIC_W;

  platforms.forEach(p => {
    if (p.type === "moving") {
      let speed = 1.5 + score / 2000;
      p.x += p.vx > 0 ? speed : -speed;
      if (p.x <= 0 || p.x + p.w >= LOGIC_W) p.vx *= -1;
    }
  });

  platforms.forEach(p => {
    [-LOGIC_W, 0, LOGIC_W].forEach(offset => {
      if (player.vy > 0 &&
          player.x + offset < p.x + p.w &&
          player.x + player.w + offset > p.x &&
          prevY + player.h >= p.y - 2 &&
          prevY + player.h <= p.y + 10) {
        player.vy = jumpForce;
        if (p.type === "break") {
          p.hits++;
          if (p.hits >= 2) p.broken = true;
        }
      }
    });
  });

  platforms = platforms.filter(p => !p.broken);

  if (player.y < 250) {
    let diff = 250 - player.y;
    player.y = 250;
    score += Math.floor(diff); // Score is now consistent across resolutions
    platforms.forEach(p => p.y += diff);
  }

  platforms.forEach(p => {
    if (p.y > LOGIC_H) {
      let ref = platforms[Math.floor(Math.random() * platforms.length)];
      p.y = 0;
      p.x = ref.x + (Math.random() * 100 - 50);
      p.x = Math.max(0, Math.min(LOGIC_W - p.w, p.x));
      p.hits = 0;
      p.broken = false;
      
      if (score - lastSpecialScore > 1500) {
        p.type = Math.random() < 0.5 ? "moving" : "break";
        if (p.type === "moving") p.vx = Math.random() < 0.5 ? 1.5 : -1.5;
        lastSpecialScore = score;
      } else {
        let tr = Math.random();
        if (tr < 0.25) { p.type = "moving"; p.vx = Math.random() < 0.5 ? 1.5 : -1.5; }
        else if (tr < 0.5) { p.type = "break"; }
        else { p.type = "normal"; }
      }
    }
  });

  if (player.y > LOGIC_H) gameOver = true;
}

function draw() {
  ctx.clearRect(0, 0, LOGIC_W, LOGIC_H);

  [-LOGIC_W, 0, LOGIC_W].forEach(offset => {
    ctx.fillStyle = "lime";
    ctx.fillRect(player.x + offset, player.y, player.w, player.h);
  });

  platforms.forEach(p => {
    if (p.type === "moving") ctx.fillStyle = "orange";
    else if (p.type === "break") {
      let alpha = 1 - p.hits * 0.5;
      ctx.fillStyle = `rgba(255,0,0,${alpha})`;
    } else ctx.fillStyle = "white";
    ctx.fillRect(p.x, p.y, p.w, p.h);
  });

  ctx.fillStyle = "white";
  ctx.font = "16px Arial";
  ctx.textAlign = "right";
  ctx.fillText("Score: " + score, LOGIC_W - 10, 30);

  if (gameOver) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, 0, LOGIC_W, LOGIC_H);
    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = "30px Arial";
    ctx.fillText("Game Over", LOGIC_W/2, 220);
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, LOGIC_W/2, 260);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>

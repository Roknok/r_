<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Maze Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>

    <style>
      body {
        margin: 0;
        background: #111;
        overflow: hidden;
        font-family: Arial;
        touch-action: none;
      }
      canvas {
        display: block;
      }

      #restartBtn {
        position: absolute;
        width: 220px;
        height: 70px;
        background: #1e1e1e;
        color: white;
        border: 2px solid white;
        border-radius: 10px;
        font-size: 26px;
        cursor: pointer;
        display: none;
        z-index: 10;
      }
    </style>
  </head>

  <body>
    <button id="restartBtn">Restart</button>

    <script>
      let cols = 25;
      let rows = 25;

      let size, offsetX, offsetY;
      let margin = 80;

      let grid = [];
      let stack = [];

      let player = { x: 0, y: 0 };
      let px = 0,
        py = 0;

      let goal = { x: cols - 1, y: rows - 1 };

      let moveDelay = 140;
      let lastMove = 0;

      let timerStarted = false;
      let startTime = 0;
      let finalTime = 0;
      let gameFinished = false;

      let path = [];
      let visitedSet = new Set();
      let timePerTile = 0;

      let touchStartX = 0;
      let touchStartY = 0;
      let swipeDir = null;

      let restartBtn;

      // 🔥 shifting
      let lastMazeShift = 0;
      let shiftInterval = 7000; // ✅ FIXED (5 sec)

      class Cell {
        constructor(x, y) {
          this.x = x;
          this.y = y;
          this.walls = [true, true, true, true];
          this.visited = false;
        }

        show(alpha) {
          let x = offsetX + this.x * size;
          let y = offsetY + this.y * size;

          stroke(255, 255, 255, alpha);
          strokeWeight(1);

          if (this.walls[0]) line(x, y, x + size, y);
          if (this.walls[1]) line(x + size, y, x + size, y + size);
          if (this.walls[2]) line(x + size, y + size, x, y + size);
          if (this.walls[3]) line(x, y + size, x, y);
        }
      }

      function index(x, y) {
        if (x < 0 || y < 0 || x >= cols || y >= rows) return -1;
        return x + y * cols;
      }

      function removeWalls(a, b) {
        let x = a.x - b.x;
        if (x == 1) {
          a.walls[3] = false;
          b.walls[1] = false;
        }
        if (x == -1) {
          a.walls[1] = false;
          b.walls[3] = false;
        }

        let y = a.y - b.y;
        if (y == 1) {
          a.walls[0] = false;
          b.walls[2] = false;
        }
        if (y == -1) {
          a.walls[2] = false;
          b.walls[0] = false;
        }
      }

      // 🔥 FULL RESET (only for restart button)
      function generateMaze(startX = 0, startY = 0) {
        grid = [];
        stack = [];
        path = [];
        visitedSet.clear();

        buildMaze(startX, startY);

        player = { x: startX, y: startY };
        px = startX;
        py = startY;

        goal = { x: cols - 1, y: rows - 1 };

        timerStarted = false;
        gameFinished = false;

        path.push({ x: player.x, y: player.y });
        visitedSet.add(player.x + "," + player.y);

        restartBtn.style.display = "none";
      }

      // 🔥 ONLY rebuild maze (keep progress)
      function reshuffleMaze() {
        let currentX = player.x;
        let currentY = player.y;

        buildMaze(currentX, currentY);

        // keep player exactly where they are
        player.x = currentX;
        player.y = currentY;
      }

      // 🔥 shared maze builder
      function buildMaze(startX, startY) {
        grid = [];
        stack = [];

        for (let y = 0; y < rows; y++) {
          for (let x = 0; x < cols; x++) {
            grid.push(new Cell(x, y));
          }
        }

        let current = grid[index(startX, startY)];
        current.visited = true;
        stack.push(current);

        while (stack.length > 0) {
          let neighbors = [];

          let top = grid[index(current.x, current.y - 1)];
          let right = grid[index(current.x + 1, current.y)];
          let bottom = grid[index(current.x, current.y + 1)];
          let left = grid[index(current.x - 1, current.y)];

          if (top && !top.visited) neighbors.push(top);
          if (right && !right.visited) neighbors.push(right);
          if (bottom && !bottom.visited) neighbors.push(bottom);
          if (left && !left.visited) neighbors.push(left);

          if (neighbors.length > 0) {
            let next = random(neighbors);
            next.visited = true;

            stack.push(current);
            removeWalls(current, next);
            current = next;
          } else {
            current = stack.pop();
          }
        }
      }

      function setup() {
        createCanvas(window.innerWidth, window.innerHeight);

        size = min((width - margin * 2) / cols, (height - margin * 2) / rows);
        offsetX = (width - cols * size) / 2;
        offsetY = (height - rows * size) / 2;

        restartBtn = document.getElementById("restartBtn");
        restartBtn.onclick = () => generateMaze(0, 0);

        generateMaze();
      }

      function draw() {
        background(15);

        // 🔥 reshuffle WITHOUT reset
        if (!gameFinished && millis() - lastMazeShift > shiftInterval) {
          reshuffleMaze();
          lastMazeShift = millis();
        }

        px = lerp(px, player.x, 0.25);
        py = lerp(py, player.y, 0.25);

        for (let c of grid) {
          let d = dist(c.x, c.y, px, py);
          let alpha = map(d, 0, 8, 255, 0, true);
          if (alpha > 3) c.show(alpha);
        }

        let gx = offsetX + goal.x * size;
        let gy = offsetY + goal.y * size;

        fill(255, 0, 0);
        noStroke();
        rect(gx + size * 0.2, gy + size * 0.2, size * 0.6, size * 0.6);

        let sx = offsetX + px * size;
        let sy = offsetY + py * size;

        fill(0, 255, 150);
        rect(sx + size * 0.2, sy + size * 0.2, size * 0.6, size * 0.6);

        if (timerStarted && !gameFinished) {
          let t = (millis() - startTime) / 1000;
          fill(255);
          textSize(22);
          textAlign(RIGHT, TOP);
          text(t.toFixed(2) + " s", width - 25, 20);
        }

        if (!gameFinished && dist(px, py, goal.x, goal.y) < 0.2) {
          finalTime = (millis() - startTime) / 1000;
          timePerTile = visitedSet.size / finalTime;
          gameFinished = true;
        }

        if (!gameFinished) handleMovement();

        if (gameFinished) {
          drawPath();
          drawEndScreen();

          restartBtn.style.display = "block";

          // ✅ PERFECT CENTER
          restartBtn.style.left = width / 2 - 110 + "px";
          restartBtn.style.top = height / 2 + 80 + "px";
        }
      }

      function handleMovement() {
        if (millis() - lastMove < moveDelay) return;

        let current = grid[index(player.x, player.y)];

        if (keyIsDown(87) && !current.walls[0]) {
          player.y--;
          recordStep();
        } else if (keyIsDown(83) && !current.walls[2]) {
          player.y++;
          recordStep();
        } else if (keyIsDown(65) && !current.walls[3]) {
          player.x--;
          recordStep();
        } else if (keyIsDown(68) && !current.walls[1]) {
          player.x++;
          recordStep();
        }

        if (swipeDir) {
          if (swipeDir === "UP" && !current.walls[0]) player.y--;
          else if (swipeDir === "DOWN" && !current.walls[2]) player.y++;
          else if (swipeDir === "LEFT" && !current.walls[3]) player.x--;
          else if (swipeDir === "RIGHT" && !current.walls[1]) player.x++;
          swipeDir = null;
          recordStep();
        }
      }

      function recordStep() {
        lastMove = millis();
        if (!timerStarted) {
          timerStarted = true;
          startTime = millis();
        }
        path.push({ x: player.x, y: player.y });
        visitedSet.add(player.x + "," + player.y);
      }

      function drawPath() {
        stroke(255, 0, 0);
        strokeWeight(size * 0.2);
        noFill();

        beginShape();
        for (let p of path) {
          let x = offsetX + p.x * size + size / 2;
          let y = offsetY + p.y * size + size / 2;
          vertex(x, y);
        }
        endShape();

        strokeWeight(1);
      }

      function drawEndScreen() {
        fill(0, 200);
        rect(0, 0, width, height);

        fill(255);
        textAlign(CENTER, CENTER);

        textSize(50);
        text("Maze Complete!", width / 2, height / 2 - 110);

        textSize(32);
        text(
          "Time: " + finalTime.toFixed(2) + " s",
          width / 2,
          height / 2 - 40,
        );

        textSize(24);
        text("Path length: " + visitedSet.size, width / 2, height / 2 + 5);

        text(
          "Distance / Second: " + timePerTile.toFixed(2),
          width / 2,
          height / 2 + 40,
        );
      }

      function windowResized() {
        resizeCanvas(window.innerWidth, window.innerHeight);

        size = min((width - margin * 2) / cols, (height - margin * 2) / rows);
        offsetX = (width - cols * size) / 2;
        offsetY = (height - rows * size) / 2;
      }
    </script>
  </body>
</html>

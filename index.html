<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Doodle Jump HD</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
      touch-action: none;
    }
    #game-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas { 
      background: #222; 
      display: block;
      /* Smooths out scaling in some browsers */
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }
    #restart-btn {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 15px 30px;
      font-size: 20px;
      background: lime;
      border: none;
      cursor: pointer;
      display: none;
      border-radius: 10px;
      font-weight: bold;
      z-index: 10;
      box-shadow: 0 4px 15px rgba(0,255,0,0.3);
    }
  </style>
</head>
<body>

<div id="game-container">
  <canvas id="game"></canvas>
  <button id="restart-btn">Restart Game</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const restartBtn = document.getElementById("restart-btn");

const LOGIC_W = 400;
const LOGIC_H = 600;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const screenW = window.innerWidth * 0.9;
  const screenH = window.innerHeight * 0.9;
  
  const scale = Math.min(screenW / LOGIC_W, screenH / LOGIC_H);

  // Set display size (css pixels)
  canvas.style.width = (LOGIC_W * scale) + "px";
  canvas.style.height = (LOGIC_H * scale) + "px";

  // Set actual buffer size (physical pixels) for HD clarity
  canvas.width = LOGIC_W * scale * dpr;
  canvas.height = LOGIC_H * scale * dpr;

  // Scale context to match logical units
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}

window.addEventListener('resize', resize);
resize();

// Game State
let gravity = 0.4;
let jumpForce = -11;
let gameOver = false;
let score = 0;
let lastSpecialScore = 0;

let player = { x: 180, y: 500, w: 40, h: 40, vx: 0, vy: 0 };
let platforms = [];

function createPlatforms() {
  platforms = [];
  platforms.push({ x: 160, y: 540, w: 80, h: 10, type: "safe" });
  let lastX = 160;
  for (let i = 1; i < 7; i++) {
    let p = generatePlatform(540 - i * 90, lastX);
    platforms.push(p);
    lastX = p.x;
  }
}

function generatePlatform(y, lastX) {
  let typeRand = Math.random();
  let p = {
    x: lastX + (Math.random() * 120 - 60),
    y: y, w: 80, h: 10, type: "normal", vx: 0, hits: 0
  };
  p.x = Math.max(0, Math.min(LOGIC_W - p.w, p.x));
  if (typeRand < 0.25) {
    p.type = "moving";
    p.vx = Math.random() < 0.5 ? 1.5 : -1.5;
  } else if (typeRand < 0.5) {
    p.type = "break";
  }
  return p;
}

createPlatforms();

let keys = {};
let targetX = null;

// INPUT LISTENERS
document.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;
  if (gameOver && e.key.toLowerCase() === "r") reset();
});
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function getLogicalX(clientX) {
  const rect = canvas.getBoundingClientRect();
  const visualW = parseFloat(canvas.style.width);
  const scale = visualW / LOGIC_W;
  return (clientX - rect.left) / scale;
}

// Fixed Input Logic - Prevent multi-firing and speed boosts
canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  targetX = getLogicalX(e.touches[0].clientX);
}, {passive: false});

canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  targetX = getLogicalX(e.touches[0].clientX);
}, {passive: false});

canvas.addEventListener("touchend", () => { targetX = null; });

canvas.addEventListener("mousedown", e => { targetX = getLogicalX(e.clientX); });
canvas.addEventListener("mousemove", e => { if (targetX !== null) targetX = getLogicalX(e.clientX); });
window.addEventListener("mouseup", () => { targetX = null; });

restartBtn.addEventListener("click", reset);

function reset() {
  player.x = 180; player.y = 500; player.vy = 0; player.vx = 0;
  score = 0; lastSpecialScore = 0;
  gameOver = false;
  restartBtn.style.display = "none";
  createPlatforms();
}

function update() {
  if (gameOver) {
    restartBtn.style.display = "block";
    return;
  }

  let prevY = player.y;
  
  // Horizontal Movement Logic
  if (keys["arrowleft"] || keys["a"]) {
    player.vx = -5;
  } else if (keys["arrowright"] || keys["d"]) {
    player.vx = 5;
  } else if (targetX !== null) {
    let center = player.x + player.w/2;
    if (targetX < center - 10) player.vx = -5;
    else if (targetX > center + 10) player.vx = 5;
    else player.vx = 0;
  } else {
    player.vx = 0;
  }

  player.vy += gravity;
  player.x += player.vx;
  player.y += player.vy;

  // Wrap
  if (player.x < -player.w) player.x = LOGIC_W;
  if (player.x > LOGIC_W) player.x = -player.w;

  // Platform Logic
  platforms.forEach(p => {
    if (p.type === "moving") {
      let speed = 1.5 + score / 5000;
      p.x += p.vx > 0 ? speed : -speed;
      if (p.x <= 0 || p.x + p.w >= LOGIC_W) p.vx *= -1;
    }

    // Collision
    if (player.vy > 0 &&
        player.x < p.x + p.w &&
        player.x + player.w > p.x &&
        prevY + player.h >= p.y &&
        prevY + player.h <= p.y + 15) {
      player.vy = jumpForce;
      if (p.type === "break") {
        p.hits++;
        if (p.hits >= 2) p.broken = true;
      }
    }
  });

  platforms = platforms.filter(p => !p.broken);

  // Camera Follow
  if (player.y < 250) {
    let diff = 250 - player.y;
    player.y = 250;
    score += Math.floor(diff);
    platforms.forEach(p => p.y += diff);
  }

  // Recycling
  platforms.forEach(p => {
    if (p.y > LOGIC_H) {
      let ref = platforms[Math.floor(Math.random() * platforms.length)];
      p.y = 0;
      p.x = Math.max(0, Math.min(LOGIC_W - p.w, ref.x + (Math.random() * 200 - 100)));
      p.hits = 0;
      p.broken = false;
      
      if (score - lastSpecialScore > 1500) {
        p.type = Math.random() < 0.5 ? "moving" : "break";
        if (p.type === "moving") p.vx = Math.random() < 0.5 ? 1.5 : -1.5;
        lastSpecialScore = score;
      } else {
        let tr = Math.random();
        if (tr < 0.20) { p.type = "moving"; p.vx = Math.random() < 0.5 ? 1.5 : -1.5; }
        else if (tr < 0.40) { p.type = "break"; }
        else { p.type = "normal"; }
      }
    }
  });

  if (player.y > LOGIC_H) gameOver = true;
}

function draw() {
  ctx.clearRect(0, 0, LOGIC_W, LOGIC_H);

  // Player
  ctx.fillStyle = "lime";
  ctx.fillRect(player.x, player.y, player.w, player.h);
  // Simple wrap ghost drawing
  if (player.x < 0) ctx.fillRect(player.x + LOGIC_W, player.y, player.w, player.h);
  if (player.x > LOGIC_W - player.w) ctx.fillRect(player.x - LOGIC_W, player.y, player.w, player.h);

  // Platforms
  platforms.forEach(p => {
    if (p.type === "moving") ctx.fillStyle = "orange";
    else if (p.type === "break") {
      ctx.fillStyle = p.hits === 1 ? "#660000" : "#ff0000";
    } else ctx.fillStyle = "white";
    ctx.fillRect(p.x, p.y, p.w, p.h);
  });

  // Score
  ctx.fillStyle = "white";
  ctx.font = "bold 20px Arial";
  ctx.textAlign = "right";
  ctx.fillText("Score: " + score, LOGIC_W - 20, 40);

  if (gameOver) {
    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.fillRect(0, 0, LOGIC_W, LOGIC_H);
    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = "bold 40px Arial";
    ctx.fillText("Game Over", LOGIC_W/2, 220);
    ctx.font = "24px Arial";
    ctx.fillText("Score: " + score, LOGIC_W/2, 270);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Doodle Jump Enhanced</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }
    #game-container {
      position: relative;
    }
    canvas { 
      background: #222; 
      display: block;
    }
    #restart-btn {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 10px 20px;
      font-size: 18px;
      background: lime;
      border: none;
      cursor: pointer;
      display: none; /* Hidden by default */
      border-radius: 5px;
      font-weight: bold;
    }
    #restart-btn:hover {
      background: #32cd32;
    }
  </style>
</head>
<body>

<div id="game-container">
  <canvas id="game"></canvas>
  <button id="restart-btn">Restart Game</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const restartBtn = document.getElementById("restart-btn");

canvas.width = 400;
canvas.height = 600;

let gravity = 0.4;
let jumpForce = -11;

let gameOver = false;
let score = 0;
let lastSpecialScore = 0;

let player = { x: 180, y: 500, w: 40, h: 40, vx: 0, vy: 0 };
let platforms = [];

function createPlatforms() {
  platforms = [];
  platforms.push({ x: 160, y: 540, w: 80, h: 10, type: "safe" });

  let lastX = 160;

  for (let i = 1; i < 7; i++) {
    let typeRand = Math.random();

    let p = {
      x: lastX + (Math.random() * 120 - 60),
      y: 540 - i * 90,
      w: 80,
      h: 10,
      type: "normal",
      vx: 0,
      hits: 0
    };

    p.x = Math.max(0, Math.min(canvas.width - p.w, p.x));
    lastX = p.x;

    if (typeRand < 0.25) {
      p.type = "moving";
      p.vx = Math.random() < 0.5 ? 1.5 : -1.5;
    } else if (typeRand < 0.5) {
      p.type = "break";
    }

    platforms.push(p);
  }
}

createPlatforms();

let keys = {};
let targetX = null;
let prevY = player.y;

// input listeners
document.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;
  if (gameOver && e.key.toLowerCase() === "r") reset();
});

document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Button listener
restartBtn.addEventListener("click", reset);

canvas.addEventListener("mousedown", e => {
  let rect = canvas.getBoundingClientRect();
  targetX = e.clientX - rect.left;
});

canvas.addEventListener("mousemove", e => {
  if (targetX !== null) {
    let rect = canvas.getBoundingClientRect();
    targetX = e.clientX - rect.left;
  }
});

canvas.addEventListener("mouseup", () => targetX = null);

function reset() {
  player.x = 180;
  player.y = 500;
  player.vy = 0;
  score = 0;
  lastSpecialScore = 0;
  gameOver = false;
  restartBtn.style.display = "none"; // Hide button on reset
  createPlatforms();
}

function update() {
  if (gameOver) {
    restartBtn.style.display = "block"; // Show button on Game Over
    return;
  }

  prevY = player.y;

  const deadzone = 5;

  if (keys["arrowleft"] || keys["a"]) player.vx = -5;
  else if (keys["arrowright"] || keys["d"]) player.vx = 5;
  else if (targetX !== null) {
    let center = player.x + player.w/2;
    if (targetX < center - deadzone) player.vx = -5;
    else if (targetX > center + deadzone) player.vx = 5;
    else player.vx = 0;
  } else player.vx = 0;

  player.vy += gravity;
  player.x += player.vx;
  player.y += player.vy;

  if (player.x < 0) player.x += canvas.width;
  if (player.x > canvas.width) player.x -= canvas.width;

  platforms.forEach(p => {
    if (p.type === "moving") {
      let speed = 1.5 + score / 2000;
      p.x += p.vx > 0 ? speed : -speed;
      if (p.x <= 0 || p.x + p.w >= canvas.width) p.vx *= -1;
    }
  });

  platforms.forEach(p => {
    [-canvas.width, 0, canvas.width].forEach(offset => {
      if (
        player.vy > 0 &&
        player.x + offset < p.x + p.w &&
        player.x + player.w + offset > p.x &&
        prevY + player.h >= p.y - 2 &&
        prevY + player.h <= p.y + 10
      ) {
        player.vy = jumpForce;

        if (p.type === "break") {
          p.hits++;
          if (p.hits >= 2) p.broken = true;
        }
      }
    });
  });

  platforms = platforms.filter(p => !p.broken);

  if (player.y < 250) {
    let diff = 250 - player.y;
    player.y = 250;
    score += Math.floor(diff);
    platforms.forEach(p => p.y += diff);
  }

  platforms.forEach(p => {
    if (p.y > canvas.height) {
      let ref = platforms[Math.floor(Math.random() * platforms.length)];
      p.y = 0;
      p.x = ref.x + (Math.random() * 100 - 50);
      p.x = Math.max(0, Math.min(canvas.width - p.w, p.x));
      p.hits = 0;
      p.broken = false;
      
      if (score - lastSpecialScore > 1500) {
        p.type = Math.random() < 0.5 ? "moving" : "break";
        if (p.type === "moving") p.vx = Math.random() < 0.5 ? 1.5 : -1.5;
        lastSpecialScore = score;
      } else {
        let typeRand = Math.random();
        if (typeRand < 0.25) {
          p.type = "moving";
          p.vx = Math.random() < 0.5 ? 1.5 : -1.5;
        } else if (typeRand < 0.5) {
          p.type = "break";
        } else {
          p.type = "normal";
        }
      }
    }
  });

  if (player.y > canvas.height) gameOver = true;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  [-canvas.width, 0, canvas.width].forEach(offset => {
    ctx.fillStyle = "lime";
    ctx.fillRect(player.x + offset, player.y, player.w, player.h);
  });

  platforms.forEach(p => {
    if (p.type === "moving") ctx.fillStyle = "orange";
    else if (p.type === "break") {
      let alpha = 1 - p.hits * 0.5;
      ctx.fillStyle = `rgba(255,0,0,${alpha})`;
    } else ctx.fillStyle = "white";

    ctx.fillRect(p.x, p.y, p.w, p.h);
  });

  ctx.fillStyle = "white";
  ctx.font = "16px Arial";
  ctx.textAlign = "right";
  ctx.fillText("Score: " + score, canvas.width - 10, 20);

  if (gameOver) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = "30px Arial";
    ctx.fillText("Game Over", canvas.width/2, 220);

    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, canvas.width/2, 260);
    // Removed the "Press R" text since we have a button now
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
